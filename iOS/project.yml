name: Scrapbin
options:
  bundleIdPrefix: com.shimondeitel.scrapbin
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Scrapbin:
    type: application
    platform: iOS
    sources:
      - path: Scrapbin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.scrapbin
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Scrapbin/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  ScrapbinTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ScrapbinTests
      - path: Scrapbin.storekit
    dependencies:
      - target: Scrapbin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.scrapbin.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  ScrapbinUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ScrapbinUITests
    dependencies:
      - target: Scrapbin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.scrapbin.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Scrapbin:
    build:
      targets:
        Scrapbin: all
        ScrapbinTests: [test]
        ScrapbinUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Scrapbin.storekit
    test:
      config: Debug
      storeKitConfiguration: Scrapbin.storekit
      targets:
        - ScrapbinTests
        - ScrapbinUITests
    archive:
      config: Release
